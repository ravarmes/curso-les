	{
		if(parent.frmToolbar)

			if (parent.g_WidgetsLoaded)

				var zoom100 = parent.frmToolbar.document.all('a100');

				else
				{
					parent.viewMgr.PostZoomProcessing = PostZoomProcessing;
					viewMgr.Zoom(100);
				}
			}
			else
			{
				window.setTimeout("fit()", 500);
			}
		}	
		else
		{
			parent.viewMgr.PostZoomProcessing = PostZoomProcessing;
